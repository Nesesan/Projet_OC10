# ================================
# Projet
# ================================
sonar.projectKey=Nesesan_Projet_OC10
sonar.organization=nesesan
sonar.host.url=https://sonarcloud.io
sonar.projectBaseDir=.

# ================================
# Front-end
# ================================
sonar.sources=front/src
sonar.tests=front/src
sonar.test.inclusions=**/*.spec.ts
sonar.exclusions=**/node_modules/**
sonar.javascript.lcov.reportPaths=front/coverage/bobapp/lcov.info
sonar.javascript.lcov.reportBasePath=front

# ================================
# Back-end
# ================================
sonar.sources+=back/src/main/java
sonar.tests+=back/src/test/java
sonar.java.binaries=back/target/classes
sonar.java.coveragePlugin=jacoco
sonar.coverage.jacoco.xmlReportPaths=back/target/site/jacoco.xml
