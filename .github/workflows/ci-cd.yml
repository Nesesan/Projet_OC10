name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

jobs:


  # ETAPE 1 : Build Front-end

  front-end:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 18

      - uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('front/package-lock.json') }}

      - run: npm ci
        working-directory: ./front

      - run: npm run build
        working-directory: ./front

  # ETAPE 2 : Tests Front-end
  front-end-tests:
    runs-on: ubuntu-latest
    needs: front-end
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 18

      - run: npm ci
        working-directory: ./front

      - run: npm run test -- --watch=false --code-coverage --browsers=ChromeHeadless
        working-directory: ./front

      - uses: actions/upload-artifact@v4
        with:
          path: ./front/coverage
          name: front-end-coverage

  # ETAPE 3 : Build Back-end
  back-end:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11

      - uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('back/pom.xml') }}

      - run: mvn clean verify
        working-directory: ./back

  # ETAPE 4 : Tests Back-end
  back-end-tests:
    runs-on: ubuntu-latest
    needs: back-end
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11
      - run: mvn test
        working-directory: ./back

      - run: mvn jacoco:report
        working-directory: ./back

      - uses: actions/upload-artifact@v4
        with:
          path: ./back/target/site/jacoco
          name: back-end-coverage

  #Analyse SonarCloud
  sonar:
    runs-on: ubuntu-latest
    needs: [ front-end-tests, back-end-tests ]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: temurin

      - uses: actions/setup-node@v5
        with:
          node-version: 18

      - name: Install Sonar Scanner
        run: npm install -g sonar-scanner

      - name: Run SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          sonar-scanner \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}
       
     
