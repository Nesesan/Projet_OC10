name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch: # permet manuellement de déclencher la pipeline

jobs:

  front-end:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 18

      - name: Cache Node modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('front/package-lock.json') }}

      - name: Install dependencies
        run: npm ci
        working-directory: ./front

      - name: Build front-end
        run: npm run build
        working-directory: ./front


  front-end-tests:
    runs-on: ubuntu-latest
    needs: front-end
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci
        working-directory: ./front

      - name: Run front-end tests
        run: npm run test -- --watch=false --code-coverage --browsers=ChromeHeadless
        working-directory: ./front

      - name: Upload Front-end coverage
        uses: actions/upload-artifact@v4
        with:
          path: ./front/coverage
          name: front-end-coverage

  back-end:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11

      - name: Cache Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('back/pom.xml') }}

      - name: Build back-end
        run: mvn clean verify
        working-directory: ./back

  # BACKEND : tests + coverage
  back-end-tests:
    runs-on: ubuntu-latest
    needs: back-end
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11

      - name: Run back-end tests
        run: mvn test
        working-directory: ./back

      - name: Generate JaCoCo report
        run: mvn jacoco:report
        working-directory: ./back

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          path: ./back/target/site/jacoco
          name: back-end-coverage


  sonar:
    runs-on: ubuntu-latest
    needs: [ front-end-tests, back-end-tests ]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Java pour le back
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: 11
          distribution: 'temurin'

      # Node pour le front
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 18

      - name: Install Sonar Scanner CLI
        run: npm install -g sonarqube-scanner

      - name: Run SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: sonar-scanner \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}