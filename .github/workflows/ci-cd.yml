name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

jobs:
  # FRONT-END : Build + Tests
  front:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 18

      - name: Cache Node modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('front/package-lock.json') }}

      - name: Install dependencies
        run: npm ci
        working-directory: ./front

      - name: Build
        run: npm run build
        working-directory: ./front

      - name: Run tests + coverage
        run: npm run test -- --watch=false --code-coverage --browsers=ChromeHeadless
        working-directory: ./front

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: front-coverage
          path: ./front/coverage


  # BACK-END : Build + Tests

  back:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('back/pom.xml') }}

      - name: Build + Tests + Coverage
        run: |
          mvn clean verify
          mvn jacoco:report
        working-directory: ./back

      - name: Upload JaCoCo coverage
        uses: actions/upload-artifact@v4
        with:
          name: back-coverage
          path: ./back/target/site/jacoco


  # ANALYSE SONARCLOUD

  sonar:
    runs-on: ubuntu-latest
    needs: [front, back]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup environments
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/setup-node@v5
        with:
          node-version: 18

      - name: Cache Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('back/pom.xml') }}

      - name: Build backend before analysis
        run: mvn -B clean verify
        working-directory: ./back

      - name: Install Sonar Scanner
        run: npm install -g sonar-scanner

      - name: Run SonarCloud Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: sonar-scanner -Dsonar.token=${{ secrets.SONAR_TOKEN }}


  # DOCKER : Build & Push Images
  docker:
    runs-on: ubuntu-latest
    needs: sonar
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build & push Frontend image
        run: |
          docker build -t bobapp-front ./front
          docker tag bobapp-front "${{ secrets.DOCKER_USERNAME }}/bobapp-front:${{ github.sha }}"
          docker push "${{ secrets.DOCKER_USERNAME }}/bobapp-front:${{ github.sha }}"

      - name: Build & push Backend image
        run: |
          docker build -t bobapp-back ./back
          docker tag bobapp-back "${{ secrets.DOCKER_USERNAME }}/bobapp-back:${{ github.sha }}"
          docker push "${{ secrets.DOCKER_USERNAME }}/bobapp-back:${{ github.sha }}"
