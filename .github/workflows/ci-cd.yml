name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch: # permet manuellement de déclencher la pipeline

jobs:

  # ================================
  # ETAPE 1 : Environnement + Build Front-end
  # ================================
  front-end:
    runs-on: ubuntu-latest
    steps:
      # Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # Node.js setup
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 18

      # Cache Node modules
      - name: Cache Node modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('front/package-lock.json') }}

      # Install dependencies
      - name: Install dependencies
        run: npm ci
        working-directory: ./front

      # Build front-end
      - name: Build front-end
        run: npm run build
        working-directory: ./front


  # ================================
  # ETAPE 2 : Tests + Rapport Front-end
  # ================================
  front-end-tests:
    runs-on: ubuntu-latest
    needs: front-end
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci
        working-directory: ./front

      # Run tests with coverage
      - name: Run front-end tests
        run: npm run test -- --watch=false --code-coverage --browsers=ChromeHeadless
        working-directory: ./front

      # Upload coverage report
      - name: Upload Front-end coverage
        uses: actions/upload-artifact@v4
        with:
          path: ./front/coverage
          name: front-end-coverage


  # ================================
  # ETAPE 1 : Environnement + Build Back-end
  # ================================
  back-end:
    runs-on: ubuntu-latest
    steps:
      # Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # Java setup
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11

      # Cache Maven
      - name: Cache Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('back/pom.xml') }}

      # Build back-end
      - name: Build back-end
        run: mvn clean verify
        working-directory: ./back


  # ================================
  # ETAPE 2 : Tests + Rapport Back-end
  # ================================
  back-end-tests:
    runs-on: ubuntu-latest
    needs: back-end
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11

      # Run tests (mvn verify already compiles & tests, mais on refait pour bien séparer)
      - name: Run back-end tests
        run: mvn test
        working-directory: ./back

      # Generate JaCoCo report
      - name: Generate JaCoCo report
        run: mvn jacoco:report
        working-directory: ./back

      # Upload JaCoCo report
      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          path: ./back/target/site/jacoco
          name: back-end-coverage


  sonar:
    runs-on: ubuntu-latest
    needs: [ front-end-tests, back-end-tests ]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: temurin

      - name: Cache Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('back/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          cd back
          mvn clean verify sonar:sonar -Dsonar.login=${{ secrets.SONAR_TOKEN }}
