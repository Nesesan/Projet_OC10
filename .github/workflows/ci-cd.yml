name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

jobs:
  # ================================
  # ETAPE 1 : Build Front-end
  # ================================
  front-end:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v5
        with:
          node-version: 18

      - name: Cache Node modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('front/package-lock.json') }}

      - name: Install dependencies
        run: npm ci
        working-directory: ./front

      - name: Build front-end
        run: npm run build
        working-directory: ./front


  # ================================
  # ETAPE 2 : Tests Front-end
  # ================================
  front-end-tests:
    runs-on: ubuntu-latest
    needs: front-end
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v5
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci
        working-directory: ./front

      - name: Run tests + coverage
        run: npm run test -- --watch=false --code-coverage --browsers=ChromeHeadless
        working-directory: ./front

      - name: Upload front-end coverage
        uses: actions/upload-artifact@v4
        with:
          name: front-end-coverage
          path: ./front/coverage


  # ================================
  # ETAPE 3 : Build Back-end
  # ================================
  back-end:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('back/pom.xml') }}

      - name: Build back-end
        run: mvn -B clean verify
        working-directory: ./back


  # ================================
  # ETAPE 4 : Tests Back-end
  # ================================
  back-end-tests:
    runs-on: ubuntu-latest
    needs: back-end
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11

      - name: Run tests
        run: mvn test
        working-directory: ./back

      - name: Generate JaCoCo coverage report
        run: mvn jacoco:report
        working-directory: ./back

      - name: Upload back-end coverage
        uses: actions/upload-artifact@v4
        with:
          name: back-end-coverage
          path: ./back/target/site/jacoco


  # ================================
  # ETAPE 5 : Analyse SonarCloud
  # ================================
  sonar:
    runs-on: ubuntu-latest
    needs: [ front-end-tests, back-end-tests ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node.js 18
        uses: actions/setup-node@v5
        with:
          node-version: 18

      - name: Cache Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('back/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build backend before Sonar analysis
        run: mvn -B clean verify
        working-directory: ./back

      - name: Install Sonar Scanner
        run: npm install -g sonar-scanner

      - name: Run SonarCloud Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: sonar-scanner -Dsonar.token=${{ secrets.SONAR_TOKEN }}


  # ================================
  # ETAPE 6 : Build & Push Docker images
  # ================================
  docker:
    runs-on: ubuntu-latest
    needs: sonar
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build & push Front-end Docker image
        run: |
          docker build -t bobapp-front ./front
          docker tag bobapp-front "${{ secrets.DOCKER_USERNAME }}/bobapp-front:${{ github.sha }}"
          docker push "${{ secrets.DOCKER_USERNAME }}/bobapp-front:${{ github.sha }}"

      - name: Build & push Back-end Docker image
        run: |
          docker build -t bobapp-back ./back
          docker tag bobapp-back "${{ secrets.DOCKER_USERNAME }}/bobapp-back:${{ github.sha }}"
          docker push "${{ secrets.DOCKER_USERNAME }}/bobapp-back:${{ github.sha }}"
