name: Tests and Quality Pipeline

on:
  workflow_run:
    workflows: ["CI/CD Build"]
    types:
      - completed

jobs:
  tests-and-sonar:
    runs-on: ubuntu-latest
    steps:
      # -------------------------------
      # Checkout repository
      # -------------------------------
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------------
      # Setup Node.js (Front-end)
      # -------------------------------
      - uses: actions/setup-node@v5
        with:
          node-version: 18

      # -------------------------------
      # Front-end tests + coverage
      # -------------------------------
      - name: Install front dependencies
        run: npm ci
        working-directory: ./front

      - name: Run front-end tests with coverage
        run: npm run test -- --watch=false --code-coverage --browsers=ChromeHeadless
        working-directory: ./front

      - name: Debug front coverage
        run: cat front/coverage/bobapp/lcov.info

      # -------------------------------
      # Setup Java (Back-end)
      # -------------------------------
      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # -------------------------------
      # Build Back-end
      # -------------------------------
      - name: Build back-end
        run: mvn -B clean verify
        working-directory: ./back

      - name: Debug back binaries
        run: ls -R back/target/classes

      # -------------------------------
      # Back-end tests + Jacoco coverage
      # -------------------------------
      - name: Run back-end tests + Jacoco
        run: mvn test jacoco:report
        working-directory: ./back

      - name: Debug back coverage
        run: ls -R back/target/site/jacoco

      # -------------------------------
      # Install Sonar Scanner
      # -------------------------------
      - name: Install Sonar Scanner
        run: npm install -g sonar-scanner

      # -------------------------------
      # Run SonarCloud Analysis
      # -------------------------------
      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: sonar-scanner -Dsonar.login=${{ secrets.SONAR_TOKEN }}
