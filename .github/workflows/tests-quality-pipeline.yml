name: Tests and Quality Pipeline

on:
  workflow_run:
    workflows: ["CI/CD Build"]
    types:
      - completed

jobs:
  tests-and-sonar:
    runs-on: ubuntu-latest
    steps:
      # Checkout code
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------------- Front-end ----------------
      - uses: actions/setup-node@v5
        with:
          node-version: 18
      - run: npm ci
        working-directory: ./front
      - run: npm run test -- --watch=false --code-coverage --browsers=ChromeHeadless
        working-directory: ./front
      - name: Upload front coverage
        uses: actions/upload-artifact@v4
        with:
          name: front-coverage
          path: ./front/coverage/bobapp

      # ---------------- Back-end ----------------
      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17
      - run: mvn clean verify jacoco:report
        working-directory: ./back
      - name: Upload back coverage
        uses: actions/upload-artifact@v4
        with:
          name: back-coverage
          path: ./back/target/site/jacoco

      # ---------------- SonarCloud ----------------
      - run: npm install -g sonar-scanner
      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: sonar-scanner -Dsonar.login=${{ secrets.SONAR_TOKEN }}
