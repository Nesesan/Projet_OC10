name: Tests and Quality Pipeline

on:
  workflow_run:
    workflows: ["CI/CD Build"]
    types:
      - completed

jobs:
  tests-and-sonar:
    runs-on: ubuntu-latest
    steps:
      # -------------------------------
      # Checkout repository
      # -------------------------------
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------------
      # Setup Node.js
      # -------------------------------
      - uses: actions/setup-node@v5
        with:
          node-version: 18

      # -------------------------------
      # Front-end tests + coverage
      # -------------------------------
      - name: Install front dependencies
        run: npm ci
        working-directory: ./front

      - name: Run front-end tests with coverage
        run: npm run test -- --watch=false --code-coverage --browsers=ChromeHeadless
        working-directory: ./front

      # -------------------------------
      # Setup Java
      # -------------------------------
      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # -------------------------------
      # Back-end tests + Jacoco
      # -------------------------------
      - name: Run back-end tests + Jacoco
        run: mvn test jacoco:report
        working-directory: ./back

      # -------------------------------
      # Install Sonar Scanner
      # -------------------------------
      - name: Install Sonar Scanner
        run: npm install -g sonar-scanner

      # -------------------------------
      # Run SonarCloud Analysis
      # -------------------------------
      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          sonar-scanner \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.projectKey=Nesesan_Projet_OC10 \
            -Dsonar.organization=nesesan \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.sources=front/src,back/src/main/java \
            -Dsonar.tests=front/src,back/src/test/java \
            -Dsonar.test.inclusions=**/*.spec.ts,**/*Test.java \
            -Dsonar.exclusions=**/node_modules/** \
            -Dsonar.javascript.lcov.reportPaths=front/coverage/bobapp/lcov.info
            -Dsonar.java.binaries=back/target/classes \
            -Dsonar.java.coveragePlugin=jacoco \
            -Dsonar.coverage.jacoco.xmlReportPaths=back/target/site/jacoco/jacoco.xml
