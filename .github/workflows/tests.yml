name: Tests Pipeline

on:
  workflow_run:
    workflows: ["CI/CD Build"]
    types:
      - completed

jobs:
  front-end-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 18

      - run: npm ci
        working-directory: ./front
      - run: npm run test -- --watch=false --code-coverage --browsers=ChromeHeadless
        working-directory: ./front

      # Upload front-end coverage pour le workflow Qualité
      - name: Upload front-end coverage
        uses: actions/upload-artifact@v4
        with:
          name: front-end-coverage
          path: ./front/coverage

  back-end-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11

      - run: mvn test jacoco:report
        working-directory: ./back

      # Upload back-end coverage pour le workflow Qualité
      - name: Upload back-end coverage
        uses: actions/upload-artifact@v4
        with:
          name: back-end-coverage
          path: ./back/target/site/jacoco
