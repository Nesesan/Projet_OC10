name: CI/CD Build

on:
  push:
    branches: ["main", "develop"]
  workflow_dispatch:

jobs:
  build-front:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 18

      - name: Install front dependencies
        run: npm ci
        working-directory: ./front

      - name: Build front
        run: npm run build
        working-directory: ./front

      - name: Upload front build for downstream
        uses: actions/upload-artifact@v4
        with:
          name: front-build
          path: ./front

  build-back:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11

      - name: Build back
        run: mvn -B clean verify
        working-directory: ./back

      - name: Upload back build for downstream
        uses: actions/upload-artifact@v4
        with:
          name: back-build
          path: ./back/target
